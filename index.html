<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryunan Hub 🔴⚫</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* ─── SETUP & THEME VARIABLES ─── */
        :root {
            --neon-red: #ff003c;
            --neon-glow: rgba(255, 0, 60, 0.65);
            --neon-intense: 0 0 15px #ff003c, 0 0 30px #ff003c, 0 0 45px #ff003c;
            --blood-dark: #0a0104;
            --glass-bg: rgba(10, 2, 5, 0.88);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Mitr', sans-serif;
        }

        html, body { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            background-color: var(--blood-dark);
            /* ลวดลายลูกไม้แนวโกธิค (Gothic Lace Pattern) ผสมพื้นหลังดวงจันทร์ */
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 9%, rgba(255, 0, 60, 0.03) 10%, rgba(255, 0, 60, 0.03) 12%, transparent 13%),
                radial-gradient(circle at 0 0, transparent 9%, rgba(255, 0, 60, 0.03) 10%, rgba(255, 0, 60, 0.03) 12%, transparent 13%),
                radial-gradient(circle at 100% 100%, transparent 9%, rgba(255, 0, 60, 0.03) 10%, rgba(255, 0, 60, 0.03) 12%, transparent 13%),
                radial-gradient(circle at 100% 0, transparent 9%, rgba(255, 0, 60, 0.03) 10%, rgba(255, 0, 60, 0.03) 12%, transparent 13%),
                radial-gradient(circle at 0 100%, transparent 9%, rgba(255, 0, 60, 0.03) 10%, rgba(255, 0, 60, 0.03) 12%, transparent 13%),
                linear-gradient(45deg, transparent 48%, rgba(255, 0, 60, 0.02) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(255, 0, 60, 0.02) 50%, transparent 52%);
            background-size: 60px 60px, 60px 60px, 60px 60px, 60px 60px, 60px 60px, 60px 60px, 60px 60px;
            font-family: var(--font-body); 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow-x: hidden;
        }

        /* แสงออร่าสีแดงลึกลับชั้นหลัง */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(150, 0, 30, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(255, 0, 60, 0.2) 0%, transparent 50%);
            z-index: -2;
            pointer-events: none;
        }

        /* เศษละอองดาวกุหลาบกระพริบ */
        .ambient-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, var(--neon-red) 1px, transparent 1.5px),
                radial-gradient(circle, #ffffff 0.8px, transparent 1.2px);
            background-size: 130px 130px, 170px 170px;
            animation: pulseAmbient 4s infinite alternate;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
        }

        @keyframes pulseAmbient {
            0% { opacity: 0.15; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.02); }
        }

        /* ─── MAIN CONTAINER ─── */
        .container { 
            background: var(--glass-bg); 
            max-width: 480px; 
            width: 90%; 
            border-radius: 30px; 
            padding: 35px 25px; 
            border: 2px solid var(--neon-red); 
            box-shadow: 0 0 30px var(--neon-glow), inset 0 0 15px rgba(255, 0, 60, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            position: relative;
            z-index: 10;
            margin: 20px auto;
        }

        .container::after {
            content: '🌹';
            position: absolute;
            bottom: -15px;
            right: 15px;
            font-size: 28px;
            filter: drop-shadow(0 0 8px var(--neon-red));
        }

        h1 { 
            font-family: var(--font-display); 
            color: var(--neon-red); 
            text-align: center; 
            text-shadow: 0 0 15px var(--neon-red), 0 0 5px #ffffff;
            font-size: 32px;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        /* ─── IMAGE BOX NEON RUNNING LIGHTS ─── */
        .image-box { 
            text-align: center; 
            background: rgba(15, 5, 8, 0.8); 
            padding: 6px; 
            border-radius: 24px; 
            margin-bottom: 12px; 
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .image-box::before {
            content: '';
            position: absolute;
            width: 160%;
            height: 160%;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-red));
            animation: rotateNeon 2.5s linear infinite;
        }

        .image-box-inner {
            position: relative;
            background: #0d0407;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            padding: 8px;
            z-index: 1;
        }

        @keyframes rotateNeon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 🛠️ แก้ไขตรงนี้: ปล่อยให้แสดงผลรูปภาพเต็มใบ ไม่โดนครอบสัดส่วน */
        .profile-img { 
            width: 100%;
            height: auto;
            max-height: none; 
            object-fit: contain;
            border-radius: 14px; 
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
            display: block;
            transition: opacity 0.3s ease, transform 0.5s ease;
        }

        /* ─── SWAP IMAGE BUTTON ─── */
        .swap-btn {
            background: linear-gradient(135deg, var(--neon-red), #990022);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 22px;
            border-radius: 30px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 0 15px var(--neon-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .swap-btn:hover {
            box-shadow: 0 0 25px var(--neon-red), 0 0 10px #ffffff;
            transform: scale(1.08) translateY(-2px);
        }

        .swap-btn:active { transform: scale(0.95); }
        
        /* ─── MAIN BUTTONS ─── */
        .neon-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 14px; 
            background: rgba(20, 5, 10, 0.5); 
            color: #ffffff; 
            border: 2px solid var(--neon-red); 
            border-radius: 16px; 
            font-weight: 600; 
            font-size: 16px;
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-family: var(--font-body); 
            text-align: left;
            padding-left: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .neon-btn::after {
            content: '✦';
            position: absolute;
            right: 25px;
            color: var(--neon-red);
            transition: all 0.3s ease;
        }

        .neon-btn:hover { 
            background: rgba(255, 0, 60, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
            transform: translateX(4px);
        }

        /* เอฟเฟกต์เรืองแสงเด่นชัดเมื่อกดปุ่ม (Active State) */
        .neon-btn.btn-active {
            background: var(--neon-red) !important;
            color: #ffffff !important;
            box-shadow: var(--neon-intense), inset 0 0 15px rgba(255, 255, 255, 0.6) !important;
            border-color: #ffffff !important;
            animation: pulseGlow 1.5s infinite alternate;
        }

        .neon-btn.btn-active::after {
            color: #ffffff !important;
            transform: rotate(180deg) scale(1.3);
            text-shadow: 0 0 10px #fff;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px #ff003c, 0 0 25px #ff003c, inset 0 0 10px rgba(255,255,255,0.4); }
            100% { box-shadow: 0 0 25px #ff003c, 0 0 45px #ff003c, inset 0 0 20px rgba(255,255,255,0.6); }
        }

        /* ─── CONTACT LINKS ─── */
        .contact-group { 
            margin-top: 30px; 
            border-top: 1px dashed rgba(255, 0, 60, 0.3); 
            padding-top: 20px; 
        }

        .link-btn { 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px; 
            margin-bottom: 10px; 
            background: rgba(255, 255, 255, 0.03); 
            color: rgba(255, 255, 255, 0.85); 
            text-decoration: none; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 0, 60, 0.2); 
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .link-btn:hover { 
            background: rgba(255, 0, 60, 0.1); 
            border-color: var(--neon-red); 
            color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2); 
            transform: scale(1.02);
        }

        /* ─── หน้าต่างป๊อปอัป (MODAL) อัปเกรดไฟนีออนจัดเต็ม ─── */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(4, 0, 2, 0.93); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .modal-content { 
            background: #0a0103;
            border: 3px solid #ff003c; 
            padding: 35px 25px; 
            border-radius: 28px; 
            max-width: 380px; 
            width: 100%; 
            text-align: center; 
            position: relative; 
            box-shadow: 
                0 0 20px #ff003c,
                0 0 40px #ff003c,
                0 0 70px rgba(255, 0, 60, 0.8),
                inset 0 0 25px rgba(255, 0, 60, 0.3); 
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            overflow: hidden;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(255, 255, 255, 0.3), transparent, var(--neon-red));
            animation: rotateNeon 4s linear infinite;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .modal-content-inner {
            position: relative;
            z-index: 2;
            background: rgba(10, 1, 3, 0.93);
            border-radius: 20px;
            padding: 10px;
        }

        .modal.active { display: flex; }

        .modal.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal-decor {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: radial-gradient(circle, var(--neon-red) 20%, transparent 75%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px var(--neon-red);
        }

        .blood-moon-svg {
            width: 45px;
            height: 45px;
            fill: #ffffff;
            filter: drop-shadow(0 0 8px #ff003c);
        }

        .modal-content h2 {
            font-family: var(--font-display);
            color: #ffffff;
            font-size: 24px;
            margin: 10px 0 15px;
            text-shadow: 0 0 12px #ff003c, 0 0 5px #fff;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(255,0,60,0.4);
            padding-bottom: 12px;
        }

        .modal-content p {
            font-size: 15px;
            line-height: 1.7;
            color: #ffffff;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            margin-bottom: 0;
            font-weight: 400;
            text-align: center;
        }

        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            color: rgba(255, 255, 255, 0.6); 
            font-size: 30px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-family: sans-serif;
            line-height: 1;
            z-index: 10;
        }
        
        .close-btn:hover { 
            color: var(--neon-red); 
            text-shadow: var(--neon-intense);
            transform: rotate(90deg) scale(1.2);
        }

        .rose-thorns-bg {
            position: absolute;
            bottom: -15px;
            left: -10px;
            width: 120%;
            height: auto;
            opacity: 0.15;
            pointer-events: none;
            transform: rotate(-3deg);
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="background-overlay"></div>
<div class="ambient-particles"></div>

<div class="container">
    <h1>RYUNAN HUB</h1>
    
    <div class="image-box">
        <div class="image-box-inner">
            <img id="profileImage" src="https://i.ibb.co/qYPSZWS4/IMG-1251.png" alt="Ryunan" class="profile-img">
        </div>
    </div>

    <div style="text-align: center;">
        <button class="swap-btn" onclick="toggleImage()">
            <svg style="width: 14px; height: 14px; fill: currentColor;" viewBox="0 0 24 24">
                <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
            </svg>
            สลับรูปภาพ 🔁
        </button>
    </div>

    <button id="btn-intro" class="neon-btn" onclick="openModal('intro', this)">👤 แนะนำตัว 🏎️</button>
    <button id="btn-front" class="neon-btn" onclick="openModal('front', this)">🔘 ข้อมูลตัวละครหน้าบ้าน 🏎️</button>
    <button id="btn-back" class="neon-btn" onclick="openModal('back', this)">🔘 ข้อมูลตัวละครหลังบ้าน 🏎️</button>

    <div class="contact-group">
        <a href="https://instagram.com/zwexur._" target="_blank" class="link-btn">
            <span>📸 Instagram (zwexur._)</span>
            <span>➔</span>
        </a>
        <a href="https://www.tiktok.com/@xx._owez?_r=1&_t=ZS-97pgfMoSi6k" target="_blank" class="link-btn">
            <span>🎵 TikTok</span>
            <span>➔</span>
        </a>
        <a href="https://loveydovey.onelink.me/vs4G/ewygf3ml" target="_blank" class="link-btn">
            <span>💕 LoveyDovey</span>
            <span>➔</span>
        </a>
    </div>
</div>

<div id="myModal" class="modal" onclick="closeModalOnOuterClick(event)">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <div class="modal-content-inner">
            <div class="modal-decor">
                <svg class="blood-moon-svg" viewBox="0 0 24 24">
                    <path d="M12.3 2a10 10 0 0 0-1.9.2 8 8 0 1 1 8.2 8.2c-.2-2-.8-3.9-1.9-5.5a10 10 0 0 0-4.4-2.9zm-2.8 13.4c.1.3.2.7.2 1.1a3.5 3.5 0 0 1-7 0c0-.4.1-.8.2-1.1a4 4 0 0 0 6.6 0zM12 10a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z" />
                </svg>
            </div>
            
            <div id="modal-inner-content">
                <h2 id="modal-title">หัวข้อ</h2>
                <p id="modal-text">เนื้อหาข้อความจะอยู่ตรงนี้...</p>
            </div>
        </div>

        <svg class="rose-thorns-bg" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,15 Q25,5 50,15 T100,15" fill="none" stroke="#ff003c" stroke-width="0.8"/>
            <path d="M20,11 L23,15 L18,15 Z M45,15 L43,9 L48,13 Z M75,10 L78,15 L73,15 Z" fill="#ff003c"/>
        </svg>
    </div>
</div>

<script>
    const images = [
        "https://i.ibb.co/qYPSZWS4/IMG-1251.png",
        "https://i.ibb.co/W4HQzc1b/IMG-1279.png"
    ];
    let currentImageIndex = 0;

    function toggleImage() {
        const imgElement = document.getElementById("profileImage");
        currentImageIndex = currentImageIndex === 0 ? 1 : 0;
        
        imgElement.style.opacity = 0;
        imgElement.style.transform = "scale(0.95)";
        
        setTimeout(() => {
            imgElement.src = images[currentImageIndex];
            imgElement.style.opacity = 1;
            imgElement.style.transform = "scale(1)";
        }, 200);
    }

    const content = {
        intro: { 
            title: "🌹 แนะนำตัว 🌹", 
            text: "สวัสดีครับผมชื่อ รยูนัน ที่เป็นเจ้าของแท็กบ้าน #ลูกพ่อยูสุดเข้ครับ และยินดีที่ได้รู้จักครับ สามารถมาทำความรู้จัก และแจ้งปัญหาให้ผมทราบได้ทางช่องการติดต่อ IG: zwexur._" 
        },
        front: { 
            title: "🌒 ตัวละครหน้าบ้าน 🌒", 
            text: "เป็นตัวละครที่จะเปิดเผย และปล่อยลงให้เล่นหน้าบ้านเลิฟวี่ดัฟวี่ของรยูนันเท่านั้น ตัวอย่างเช่น ลุงวันดี และตัวละครอื่นๆ อีกมากมายที่น่าติดตาม!" 
        },
        back: { 
            title: "🩸 ตัวละครหลังบ้าน 🩸", 
            text: "เป็นตัวละครที่ไม่เปิดเผย หรือตัวละครที่ทางรยูนันใช้เทสบอทหน้าบ้านเท่านั้น การแยกตัวละครหน้าบ้านคือให้ดูหัวข้อไฮไลท์ของสตอรี่นั้นๆ ที่รยูนันได้เพิ่มเอาไว้ในไอจี" 
        }
    };

    function openModal(type, element) {
        document.querySelectorAll('.neon-btn').forEach(btn => {
            btn.classList.remove('btn-active');
        });
        
        if(element) {
            element.classList.add('btn-active');
        }

        document.getElementById("modal-title").innerText = content[type].title;
        document.getElementById("modal-text").innerText = content[type].text;
        
        const modal = document.getElementById("myModal");
        modal.style.display = "flex";
        
        void modal.offsetWidth; 
        modal.classList.add("active");
    }

    function closeModal() {
        const modal = document.getElementById("myModal");
        modal.classList.remove("active");
        setTimeout(() => {
            modal.style.display = "none";
        }, 300);
    }

    function closeModalOnOuterClick(event) {
        if (event.target.id === "myModal") {
            closeModal();
        }
    }
</script>

</body>
</html>
